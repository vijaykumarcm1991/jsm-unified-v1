{% extends "base.html" %}

{% block content %}

<div class="bg-white rounded-xl shadow-sm p-6">

    <table class="w-full text-left text-sm">
        <thead>
            <tr class="border-b text-gray-500 uppercase text-xs">
                <th class="py-3">Name</th>
                <th class="py-3">Source</th>
                <th class="py-3">Status</th>
                <th class="py-3">Actions</th>
            </tr>
        </thead>

        <tbody id="reportTable">
            <!-- Data will load here -->
        </tbody>
    </table>

    <div class="bg-white rounded-xl shadow-sm p-6 mt-6">
        <h2 class="text-lg font-semibold mb-3">📜 Logs</h2>

        <div id="logsContainer"
            class="bg-black text-green-400 text-xs p-3 rounded h-64 overflow-y-auto font-mono">
        </div>
    </div>

</div>

<!-- ✅ ADD HERE -->
<div id="historyModal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-6 w-3/4 max-h-[80vh] overflow-y-auto">
        <h2 class="text-xl font-semibold mb-4">Report History</h2>

        <table class="w-full text-left text-sm">
            <thead>
                <tr class="border-b text-gray-500 uppercase text-xs">
                    <th>Generated At</th>
                    <th>Status</th>
                    <th>Download</th>
                </tr>
            </thead>
            <tbody id="historyTable"></tbody>
        </table>

        <div class="text-right mt-4">
            <button onclick="closeHistory()"
                class="bg-gray-500 text-white px-4 py-2 rounded">
                Close
            </button>
        </div>
    </div>
</div>

<div id="scheduleModal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md relative">

        <div class="mb-4 border-b pb-2">
            <h2 class="text-lg font-semibold">Schedule Report</h2>
        </div>

        <input type="hidden" id="scheduleReportId">

        <!-- LIST VIEW -->
        <div id="scheduleView"></div>

        <!-- FORM VIEW -->
        <div id="scheduleForm" class="hidden mt-4">

            <select id="frequency" class="w-full border p-2 rounded mb-2" onchange="toggleFields()">
                <option value="">Select Frequency</option>
                <option value="DAILY">Daily</option>
                <option value="WEEKLY">Weekly</option>
                <option value="MONTHLY">Monthly</option>
            </select>

            <input type="time" id="scheduleTime" class="w-full border p-2 rounded mb-2">

            <!-- WEEKLY -->
            <select id="dayOfWeek" class="w-full border p-2 rounded mb-2 hidden">
                <option value="">Select Day</option>
                <option value="mon">Monday</option>
                <option value="tue">Tuesday</option>
                <option value="wed">Wednesday</option>
                <option value="thu">Thursday</option>
                <option value="fri">Friday</option>
                <option value="sat">Saturday</option>
                <option value="sun">Sunday</option>
            </select>

            <!-- MONTHLY -->
            <input type="number" id="dayOfMonth" placeholder="Day of month (1-31)"
                class="w-full border p-2 rounded mb-2 hidden">

            <input type="email" id="emailTo" placeholder="Email"
                class="w-full border p-2 rounded mb-2">
            
            <input type="text" id="ccEmail" placeholder="CC (comma separated)"
                class="w-full border p-2 rounded mb-2">

            <input type="text" id="emailSubject" placeholder="Email Subject"
                class="w-full border p-2 rounded mb-2">

            <textarea id="emailBody" placeholder="Email Body"
                class="w-full border p-2 rounded mb-2 h-24"></textarea>

            <div class="flex justify-between mt-4">
                <button onclick="closeSchedule()" class="bg-gray-400 text-white px-4 py-2 rounded">
                    Cancel
                </button>

                <button onclick="saveSchedule()" class="bg-green-600 text-white px-4 py-2 rounded">
                    Save
                </button>
            </div>

        </div>

    </div>
</div>

{% endblock %}

{% block scripts %}
{% raw %}
<script>
async function loadReports() {
    try {
        const res = await fetch("/reports/");
        const data = await res.json();

        console.log("Reports:", data);

        const table = document.getElementById("reportTable");

        if (!table) {
            console.error("reportTable not found");
            return;
        }

        let html = "";

        data.forEach(r => {
            startPolling(r.id); 
            html += `
            <tr class="border-b h-14 hover:bg-gray-50 transition">
                <td class="py-2">${r.name}</td>
                <td class="py-2">${r.source_type}</td>
                <td class="py-2">
                    <div id="status-${r.id}" class="w-full">
                        <div class="bg-gray-200 rounded h-3 w-full">
                            <div id="bar-${r.id}" class="h-3 rounded bg-gray-400" style="width:0%"></div>
                        </div>
                        <div id="text-${r.id}" class="text-xs mt-1 text-gray-600">Idle</div>
                    </div>
                </td>
                <td>
                    <div class="flex gap-2 flex-wrap">

                        <button onclick="runReport(${r.id})"
                            class="flex items-center gap-1 bg-black text-white px-3 py-1 rounded hover:opacity-80 hover:scale-105 transition text-xs">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3l14 9-14 9V3z"/>
                            </svg>
                            Run
                        </button>

                        <button onclick="cancelReport(${r.id})"
                            class="flex items-center gap-1 bg-red-500 text-white px-3 py-1 rounded hover:opacity-80 hover:scale-105 transition text-xs">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                            Cancel
                        </button>

                        <button onclick="viewHistory(${r.id})"
                            class="flex items-center gap-1 bg-blue-500 text-white px-3 py-1 rounded hover:opacity-80 hover:scale-105 transition text-xs">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3M12 6a6 6 0 100 12 6 6 0 000-12z"/>
                            </svg>
                            History
                        </button>

                        <button onclick="openSchedule(${r.id})"
                            class="flex items-center gap-1 bg-purple-600 text-white px-3 py-1 rounded text-xs hover:opacity-80">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 7V3m8 4V3M4 11h16M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            Schedule
                        </button>

                        <button onclick="downloadLatest(${r.id})"
                            class="flex items-center gap-1 bg-green-600 text-white px-3 py-1 rounded hover:opacity-80 hover:scale-105 transition text-xs">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/>
                            </svg>
                            Latest
                        </button>

                        <button onclick="copyReport(${r.id})"
                            class="flex items-center gap-1 bg-gray-700 text-white px-3 py-1 rounded hover:opacity-80 hover:scale-105 transition text-xs">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M8 16h8M8 12h8m-6-8h6a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2z"/>
                            </svg>
                            Copy
                        </button>

                        <button onclick="editReport(${r.id})"
                        class="flex items-center gap-1 bg-yellow-500 text-white px-3 py-1 rounded text-xs">
                        ✏️ Edit
                        </button>

                        <button onclick="saveAsReport(${r.id})"
                        class="flex items-center gap-1 bg-indigo-500 text-white px-3 py-1 rounded text-xs">
                        📄 Save As
                        </button>

                        <button onclick="deleteReport(${r.id})"
                        class="flex items-center gap-1 bg-red-700 text-white px-3 py-1 rounded text-xs">
                        🗑 Delete
                        </button>

                    </div>
                </td>
            </tr>`;
        });

        table.innerHTML = html;

    } catch (err) {
        console.error("Error loading reports:", err);
    }
}

async function runReport(id) {

    await fetch(`/reports/${id}/run`);
    showToast("Report started", "info");

    // ✅ wait for completion
    const interval = setInterval(async () => {

        const res = await fetch(`/reports/${id}/status`);
        const data = await res.json();

        if (data.status === "COMPLETED") {

            clearInterval(interval);

            // ✅ auto download latest
            const latest = await fetch(`/reports/${id}/latest`);
            const file = await latest.json();

            if (file.file_path) {
                window.open(`/reports/download?path=${encodeURIComponent(file.file_path)}`, "_blank");
            }

            showToast("Report downloaded", "success");
        }

    }, 2000);
}

async function cancelReport(id) {
    const res = await fetch(`/reports/${id}/cancel`, {
        method: "POST"
    });

    const data = await res.json();
    showToast(data.message, "info");
}

async function fetchStatus(id) {
    try {
        const res = await fetch(`/reports/${id}/status`);
        const data = await res.json();

        const bar = document.getElementById(`bar-${id}`);
        const text = document.getElementById(`text-${id}`);

        if (!bar || !text) return;

        if (data.status === "RUNNING") {
            bar.style.width = `${data.progress}%`;
            bar.className = "h-3 rounded bg-blue-500 transition-all duration-500";
            text.innerHTML = `Fetching ${data.fetched || 0} issues (${data.progress}%)`;

        } else if (data.status === "COMPLETED") {
            bar.style.width = "100%";
            bar.className = "h-3 rounded bg-green-500 transition-all duration-500";
            text.innerHTML = "Completed";

        } else if (data.status === "CANCELLED") {
            bar.style.width = "100%";
            bar.className = "h-3 rounded bg-red-500 transition-all duration-500";
            text.innerHTML = "Cancelled";

        } else {
            bar.style.width = "0%";
            bar.className = "h-3 rounded bg-gray-400";
            text.innerHTML = "Idle";
        }

    } catch (e) {
        console.error("Status fetch error", e);
    }
}

const pollingMap = {};

function startPolling(id) {
    if (pollingMap[id]) return; // prevent duplicate polling

    pollingMap[id] = setInterval(() => fetchStatus(id), 2000);
}

function formatDateTime(dt) {
    const d = new Date(dt);

    const date = d.toLocaleDateString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric"
    });

    const time = d.toLocaleTimeString("en-IN", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: true
    });

    return `${date} | ${time}`;
}

async function viewHistory(reportId) {

    const res = await fetch(`/reports/${reportId}/history`);
    const data = await res.json();

    const table = document.getElementById("historyTable");

    let html = "";

    if (!data || data.length === 0) {
        html = `
        <tr>
            <td colspan="3" class="text-center py-4 text-gray-500">
                No history available
            </td>
        </tr>`;
    } else {
        data
        .sort((a, b) => new Date(b.generated_at || 0) - new Date(a.generated_at || 0))
        .forEach(h => {
            html += `
            <tr class="border-b h-12">
                <td class="py-3">${formatDateTime(h.generated_at)}</td>
                <td class="py-3">${h.status}</td>
                <td class="py-3">
                    ${
                        h.status === "SUCCESS"
                        ? `<a href="/reports/download?path=${encodeURIComponent(h.file_path)}"
                             class="bg-green-500 text-white px-3 py-1 rounded">
                             Download
                           </a>`
                        : `<span class="text-gray-400">N/A</span>`
                    }
                </td>
            </tr>`;
        });
    }

    table.innerHTML = html;

    document.getElementById("historyModal").classList.remove("hidden");
    document.getElementById("historyModal").classList.add("flex");
}

function closeHistory() {
    document.getElementById("historyModal").classList.add("hidden");
}

async function downloadLatest(id) {
    try {
        const res = await fetch(`/reports/${id}/latest`);
        const data = await res.json();

        if (!data.file_path) {
            showToast("No report available", "error");
            return;
        }

        window.open(`/reports/download?path=${encodeURIComponent(data.file_path)}`, "_blank");

    } catch (e) {
        showToast("No report found", "error");
    }
}

async function openSchedule(id) {

    const hidden = document.getElementById("scheduleReportId");
    if (hidden) hidden.value = id;

    console.log("Opening schedule for:", id);

    document.getElementById("scheduleModal").classList.remove("hidden");
    document.getElementById("scheduleModal").classList.add("flex");

    const res = await fetch(`/reports/${id}/schedule`);
    const data = await res.json();

    let html = "";

    if (data && data.frequency) {
        html = `
            <div class="bg-gray-100 p-3 rounded">
                <p><b>${data.frequency}</b> at ${data.time}</p>
                <p class="text-sm text-gray-600">${data.email_to}</p>

                <div class="flex gap-2 mt-2">
                    <button onclick="editSchedule(
                        '${data.frequency}',
                        '${data.time}',
                        '${data.day_of_week}',
                        '${data.day_of_month}',
                        '${data.email_to}',
                        '${data.cc_email || ""}',
                        '${data.email_subject || ""}',
                        '${data.email_body || ""}'
                    )"
                        class="bg-blue-500 text-white px-3 py-1 rounded text-xs">Edit</button>

                    <button onclick="deleteSchedule()"
                        class="bg-red-500 text-white px-3 py-1 rounded text-xs">Delete</button>
                </div>
            </div>
        `;
    } else {
        html = `<p class="text-gray-500">No schedule found</p>`;
    }

    html += `
        <button onclick="showForm()" class="mt-4 bg-purple-600 text-white px-3 py-1 rounded text-sm">
            + New Schedule
        </button>
    `;

    document.getElementById("scheduleView").innerHTML = html;
    document.getElementById("scheduleForm").classList.add("hidden");
}

function closeSchedule() {
    document.getElementById("scheduleModal").classList.add("hidden");
}

async function loadSchedule(id) {
    const res = await fetch(`/reports/${id}/schedule`);
    const data = await res.json();

    if (!data) return;

    document.getElementById("frequency").value = data.frequency || "";
    document.getElementById("scheduleTime").value = data.time || "";
    document.getElementById("dayOfWeek").value = data.day_of_week || "";
    document.getElementById("dayOfMonth").value = data.day_of_month || "";
    document.getElementById("emailTo").value = data.email_to || "";
    document.getElementById("ccEmail").value = data.cc_email || ""; 
}

async function saveSchedule() {
    const id = document.getElementById("scheduleReportId").value;

    const payload = {
        frequency: document.getElementById("frequency").value,
        time: document.getElementById("scheduleTime").value,
        day_of_week: document.getElementById("dayOfWeek").value,
        day_of_month: document.getElementById("dayOfMonth").value,
        email_to: document.getElementById("emailTo").value,
        cc_email: document.getElementById("ccEmail").value,
        email_subject: document.getElementById("emailSubject").value,  // 🔥 NEW
        email_body: document.getElementById("emailBody").value         // 🔥 NEW
    };

    const res = await fetch(`/reports/${id}/schedule`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload)
    });

    const data = await res.json();

    showToast(data.message || "Schedule saved", "success");
    closeSchedule();
}

async function deleteSchedule() {
    const id = document.getElementById("scheduleReportId").value;

    await fetch(`/reports/${id}/schedule`, {
        method: "DELETE"
    });

    showToast("Schedule deleted", "success");
    closeSchedule();
}

function toggleFields() {
    const freq = document.getElementById("frequency").value;

    document.getElementById("dayOfWeek").classList.add("hidden");
    document.getElementById("dayOfMonth").classList.add("hidden");

    if (freq === "WEEKLY") {
        document.getElementById("dayOfWeek").classList.remove("hidden");
    }

    if (freq === "MONTHLY") {
        document.getElementById("dayOfMonth").classList.remove("hidden");
    }
}

function showForm() {
    document.getElementById("scheduleForm").classList.remove("hidden");
}

function editSchedule(freq, time, dow, dom, email, cc_email, subject, body) {

    showForm();

    document.getElementById("frequency").value = freq;
    document.getElementById("scheduleTime").value = time;
    document.getElementById("emailTo").value = email;
    document.getElementById("ccEmail").value = cc_email;
    document.getElementById("emailSubject").value = subject || "";
    document.getElementById("emailBody").value = body || "";

    if (dow) document.getElementById("dayOfWeek").value = dow;
    if (dom) document.getElementById("dayOfMonth").value = dom;

    toggleFields();
}

async function copyReport(id) {
    try {
        const res = await fetch(`/reports/${id}/copy`, {
            method: "POST"
        });

        const data = await res.json();

        showToast(data.message || "Report copied", "success");

        // ✅ Refresh table
        loadReports();

        } catch (e) {
            showToast("Copy failed", "error");
        }
}

function editReport(id) {
    window.location.href = `/create?mode=edit&id=${id}`;
}

function saveAsReport(id) {
    window.location.href = `/create?mode=copy&id=${id}`;
}

async function deleteReport(id) {

    if (!confirm("Are you sure you want to delete this report?")) return;

    const res = await fetch(`/reports/${id}`, {
        method: "DELETE"
    });

    const data = await res.json();

    showToast(data.message || "Deleted", "success");

    loadReports();
}

async function loadLogs() {
    try {
        const res = await fetch("/reports/logs");
        const data = await res.json();

        const container = document.getElementById("logsContainer");

        if (!container) return;

        container.innerHTML = data.logs.join("<br>");
        container.scrollTop = container.scrollHeight;

    } catch (e) {
        console.error("Logs error", e);
    }
}

document.addEventListener("keydown", function(e) {

    if (e.key === "Escape") {

        // Close Schedule Modal
        const scheduleModal = document.getElementById("scheduleModal");
        if (scheduleModal && !scheduleModal.classList.contains("hidden")) {
            closeSchedule();
        }

        // Close History Modal
        const historyModal = document.getElementById("historyModal");
        if (historyModal && !historyModal.classList.contains("hidden")) {
            closeHistory();
        }
    }
});

document.getElementById("historyModal").addEventListener("click", function(e) {
    if (e.target === this) {
        closeHistory();
    }
});

document.getElementById("scheduleModal").addEventListener("click", function(e) {
    if (e.target === this) {
        closeSchedule();
    }
});

document.addEventListener("DOMContentLoaded", () => {
    loadReports();
    loadLogs();

    setInterval(loadLogs, 5000); // refresh every 5 sec
});

</script>
{% endraw %}
{% endblock %}
