<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jira Reporting</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
    
</head>

<body class="bg-gray-50 text-gray-800">

    <div class="flex">

        <!-- Sidebar -->
        <div class="w-64 h-screen bg-white shadow-sm p-6">
            <div class="mb-8">
                <img src="/static/logo.png" alt="Logo" class="w-28 mb-3">

                <h2 class="text-lg font-semibold leading-tight">Jira Reports</h2>
                <p class="text-xs text-gray-500">Reporting Dashboard</p>
            </div>

            <ul class="space-y-3">
                <li>
                    <a href="/" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 font-medium">
                        📊 Dashboard
                    </a>
                </li>
                <li>
                    <a href="/create" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100">
                        ➕ Create Report
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-8">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-semibold">Dashboard</h1>
                <div class="text-sm text-gray-500">
                    IST Timezone
                </div>
            </div>
            {% block content %}{% endblock %}
        </div>

    </div>

    <!-- ✅ Scripts go here -->
    {% block scripts %}{% endblock %}

</body>
</html>
