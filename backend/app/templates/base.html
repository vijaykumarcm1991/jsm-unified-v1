<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jira Reporting</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
    
    <style>
    @keyframes slide-in {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
    .animate-slide-in {
        animation: slide-in 0.3s ease-out;
    }
    </style>
</head>

<body class="bg-gray-50 text-gray-800">

    <div class="flex">

        <!-- Sidebar -->
        <div class="w-64 h-screen bg-white shadow-sm p-6">
            <div class="mb-8">
                <img src="/static/logo.png" alt="Logo" class="w-28 mb-3">

                <h2 class="text-lg font-semibold leading-tight">Jira Reports</h2>
                <p class="text-xs text-gray-500">Reporting Dashboard</p>
            </div>

            <ul class="space-y-3">
                <li>
                    <a href="/" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100 font-medium">
                        📊 Dashboard
                    </a>
                </li>
                <li>
                    <a href="/create" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-gray-100">
                        ➕ Create Report
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-8">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-semibold">Dashboard</h1>

                <div class="flex gap-3 items-center">
                    <div class="text-sm text-gray-500">IST Timezone</div>

                    <div id="authButton"></div>
                </div>
            </div>
            {% block content %}{% endblock %}
        </div>

    </div>

    <!-- ✅ Scripts go here -->

<script>

function isAdmin() {
    const token = localStorage.getItem("token");

    if (!token) return false;

    try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        return payload.role === "admin";
    } catch {
        return false;
    }
}

function renderAuthButton() {
    const container = document.getElementById("authButton");

    if (!container) return;

    if (isAdmin()) {
        container.innerHTML = `
            <button onclick="logout()" class="bg-red-500 text-white px-3 py-1 rounded text-xs">
                Logout
            </button>
        `;
    } else {
        container.innerHTML = `
            <button onclick="goToLogin()" class="bg-blue-500 text-white px-3 py-1 rounded text-xs">
                Login
            </button>
        `;
    }
}

function goToLogin() {
    window.location.href = "/login-page";
}

function showToast(message, type="info") {

    const container = document.getElementById("toastContainer");

    const colors = {
        success: "bg-green-500",
        error: "bg-red-500",
        info: "bg-blue-500"
    };

    const toast = document.createElement("div");

    toast.className = `${colors[type]} text-white px-4 py-2 rounded shadow-md flex items-center gap-2 animate-slide-in`;

    toast.innerHTML = `
        <span>${message}</span>
    `;

    container.appendChild(toast);

    setTimeout(() => {
        toast.classList.add("opacity-0", "transition");
        setTimeout(() => toast.remove(), 300);
    }, 2500);
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "/";
}

document.addEventListener("DOMContentLoaded", () => {
    renderAuthButton();
});

</script>

<div id="toastContainer" class="fixed top-5 right-5 space-y-3 z-50"></div>

{% block scripts %}{% endblock %}
</body>
</html>
