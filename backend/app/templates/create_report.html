{% extends "base.html" %}

{% block content %}

<h1 class="text-2xl font-semibold mb-6">Create Report</h1>

<div class="bg-white p-6 rounded-xl shadow-sm max-w-2xl space-y-4">

    <div>
        <label class="text-sm font-medium">Report Name</label>
        <input id="name" type="text" class="w-full border p-2 rounded mt-1" />
    </div>

    <div>
        <label class="text-sm font-medium">Source</label>
        <select id="source" class="w-full border p-2 rounded mt-1">
            <option value="JIRA">JIRA</option>
            <option value="JSM">JSM</option>
        </select>
    </div>

    <div>
        <label class="text-sm font-medium">Project</label>
        <select id="project"></select>
    </div>

    <div>
        <label class="text-sm font-medium">Issue Type</label>
        <select id="issuetype"></select>
    </div>

    <div>
        <label class="text-sm font-medium">Status</label>
        <select id="status"></select>
    </div>

    <div>
        <label class="text-sm font-medium">Fields</label>
        <select id="fields" multiple></select>
    </div>

    <div>
        <label class="text-sm font-medium">Date Range</label>
        <div class="flex gap-2 mt-1">
            <input id="start_date" type="date" class="w-full border p-2 rounded" />
            <input id="end_date" type="date" class="w-full border p-2 rounded" />
        </div>
    </div>

    <div>
        <label class="text-sm font-medium">Last N Days</label>
        <input id="range_days" type="number" class="w-full border p-2 rounded mt-1" />
    </div>

    <div>
        <label class="text-sm font-medium">Date Template</label>
        <select id="date_template" class="w-full border p-2 rounded mt-1">
            <option value="">-- Select Template --</option>
            <option value="LAST_DAY">Last Day</option>
            <option value="LAST_WEEK">Last Week</option>
            <option value="LAST_MONTH">Last Month</option>
        </select>
    </div>

    <div>
        <label class="text-sm font-medium">Date Field</label>
        <select id="date_field" class="w-full border p-2 rounded mt-1">
            <option value="created">Created</option>
            <option value="updated">Updated</option>
        </select>
    </div>

    <div>
        <label class="text-sm font-medium">Export Type</label>
        <select id="export_type" class="w-full border p-2 rounded mt-1">
            <option value="xlsx">Excel (.xlsx)</option>
            <option value="csv">CSV (.csv)</option>
            <option value="json">JSON (.json)</option>
        </select>
    </div>

    <button onclick="createReport()"
        class="bg-black text-white px-4 py-2 rounded w-full hover:opacity-80">
        Create Report
    </button>

</div>

{% endblock %}

{% block scripts %}
{% raw %}
<script>

let selectedFields = [];

let projectTS, issueTypeTS, statusTS, fieldsTS;

document.addEventListener("DOMContentLoaded", () => {

    // ✅ Public can open page
    // ❌ Only block edit mode for admin

    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode");

    if (mode === "edit") {
        if (!isAdmin()) {
            alert("❌ Only admin can edit reports");
            window.location.href = "/";
        }
    }
});

// INIT
function initDropdowns() {
    projectTS = new TomSelect("#project", {
        plugins: ['remove_button'],
        maxItems: null
    });

    issueTypeTS = new TomSelect("#issuetype", {
        plugins: ['remove_button'],
        maxItems: null
    });

    statusTS = new TomSelect("#status", {
        plugins: ['remove_button'],
        maxItems: null
    });

    fieldsTS = new TomSelect("#fields", {
        plugins: ['remove_button'],
        persist: false,
        create: false,
        maxItems: null,
        onChange: function(values) {
            selectedFields = values;
        }
    });
}

// LOAD PROJECTS
async function loadProjects() {
    const source = document.getElementById("source").value;

    const res = await fetch(`/reports/metadata/projects?source_type=${source}`);
    const data = await res.json();

    projectTS.clear();
    projectTS.clearOptions();

    data.forEach(p => {
        projectTS.addOption({ value: p.key, text: p.name });
    });

    projectTS.refreshOptions(false);
}

// ISSUE TYPES
async function loadIssueTypes() {
    const source = document.getElementById("source").value;

    const res = await fetch(`/reports/metadata/issuetypes?source_type=${source}`);
    const data = await res.json();

    issueTypeTS.clear();
    issueTypeTS.clearOptions();

    data.forEach(i => {
        issueTypeTS.addOption({ value: i, text: i });
    });

    issueTypeTS.refreshOptions(false);
}

// STATUS
async function loadStatuses() {
    const source = document.getElementById("source").value;

    const res = await fetch(`/reports/metadata/statuses?source_type=${source}`);
    const data = await res.json();

    statusTS.clear();
    statusTS.clearOptions();

    data.forEach(s => {
        statusTS.addOption({ value: s, text: s });
    });

    statusTS.refreshOptions(false);
}

// FIELDS
async function loadFields() {
    const source = document.getElementById("source").value;

    const res = await fetch(`/reports/metadata/fields?source_type=${source}`);
    const data = await res.json();

    fieldsTS.clearOptions();

    data.forEach(f => {
        fieldsTS.addOption({ value: f.id, text: f.name });
    });

    fieldsTS.refreshOptions(false);

    console.log("✅ Fields loaded count:", data.length);
    console.log("✅ Sample field:", data[0]);

    // ✅ CRITICAL FIX (wait for TomSelect internal sync)
    await new Promise(resolve => setTimeout(resolve, 100));
}

// CREATE
async function createReport() {

    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode");
    const id = params.get("id");

    const payload = {
        name: document.getElementById("name").value,
        source_type: document.getElementById("source").value,
        project: projectTS.getValue(),
        issue_type: issueTypeTS.getValue(),
        status: statusTS.getValue(),
        fields: selectedFields,
        start_date: document.getElementById("start_date").value || null,
        end_date: document.getElementById("end_date").value || null,
        range_days: document.getElementById("range_days").value || null,
        date_template: document.getElementById("date_template").value || null,
        export_type: document.getElementById("export_type").value,
        date_field: document.getElementById("date_field").value
    };

    let url = "/reports/";
    let method = "POST";

    if (mode === "edit") {
        url = `/reports/${id}`;
        method = "PUT";
    }

    const token = localStorage.getItem("token");

    const headers = {
        "Content-Type": "application/json"
    };

    if (token) {
        headers["Authorization"] = `Bearer ${token}`;
    }

    const res = await fetch(url, {
        method: method,
        headers: headers,
        body: JSON.stringify(payload)
    });

    alert(mode === "edit" ? "Report updated!" : "Report created!");

    window.location.href = "/";
}

async function loadReportData(id) {

    const res = await fetch(`/reports/`);
    const data = await res.json();

    const report = data.find(r => r.id == id);
    if (!report) return;

    // ✅ Set basic fields
    document.getElementById("name").value = report.name;

    // ✅ STEP 1 — set correct source FIRST

    const sourceDropdown = document.getElementById("source");
    sourceDropdown.value = report.source_type;

    console.log("🔥 SOURCE SET:", report.source_type);

    // 🔥 TRIGGER CHANGE EVENT (VERY IMPORTANT)
    sourceDropdown.dispatchEvent(new Event("change"));

    // ✅ WAIT FOR ALL DROPDOWNS TO LOAD PROPERLY
    await loadProjects();
    await loadIssueTypes();
    await loadStatuses();
    await loadFields();

    // =========================
    // ✅ STEP 4 — PROJECT FIX (FINAL)
    // =========================
    if (report.project) {

        const savedProjects = report.project.split(",");
        const options = projectTS.options;

        const mappedValues = [];

        savedProjects.forEach(p => {

            let match = Object.values(options).find(opt =>
                opt.value.toLowerCase() === p.toLowerCase()
            );

            // 🔥 fallback (name match)
            if (!match) {
                match = Object.values(options).find(opt =>
                    opt.text.toLowerCase().includes(p.toLowerCase()) ||
                    p.toLowerCase().includes(opt.text.toLowerCase())
                );
            }

            if (match) {
                mappedValues.push(match.value);
            } else {
                console.warn("❌ Project not matched:", p);
            }
        });

        console.log("✅ Project mapping:", savedProjects, "→", mappedValues);

        projectTS.setValue(mappedValues);
    }

    console.log("📦 Saved Project:", report.project);
    console.log("📦 Available Options:", projectTS.options);

    // =========================
    // ✅ ISSUE TYPE
    // =========================
    if (report.issue_type) {
        issueTypeTS.setValue(report.issue_type.split(","));
    }

    // =========================
    // ✅ STATUS
    // =========================
    if (report.status) {
        statusTS.setValue(report.status.split(","));
    }

    // =========================
    // ✅ FIELDS FIX
    // =========================
    if (report.fields) {

        const parsed = JSON.parse(report.fields.replace(/'/g, '"'));
        const options = fieldsTS.options;
        const mappedValues = [];

        parsed.forEach(f => {
            const match = Object.values(options).find(opt =>
                opt.value.toLowerCase() === f.toLowerCase()
            );
            if (match) mappedValues.push(match.value);
        });

        fieldsTS.setValue(mappedValues);
        fieldsTS.refreshItems();

        // ✅ IMPORTANT — sync payload
        selectedFields = mappedValues;
    }
    // =========================
    // ✅ DATE PARSE FROM JQL
    // =========================
    if (report.jql) {

        // relative range
        const rangeMatch = report.jql.match(/created\s*>=\s*(-\d+d)/i);
        if (rangeMatch) {
            document.getElementById("range_days").value = parseInt(rangeMatch[1].replace("-","").replace("d",""));
        }

        // absolute dates (optional future support)
        const startMatch = report.jql.match(/created\s*>=\s*\"([0-9-]+)\"/i);
        const endMatch = report.jql.match(/created\s*<=\s*\"([0-9-]+)\"/i);

        if (startMatch) {
            document.getElementById("start_date").value = startMatch[1];
        }

        if (endMatch) {
            document.getElementById("end_date").value = endMatch[1];
        }
    }

    // 🔥 detect template from JQL
    if (report.jql) {

        if (report.jql.includes("startofday(-1)")) {
            document.getElementById("date_template").value = "LAST_DAY";
        }
        else if (report.jql.includes("startofday(-7)")) {
            document.getElementById("date_template").value = "LAST_WEEK";
        }
        else if (report.jql.includes("startofmonth(-1)")) {
            document.getElementById("date_template").value = "LAST_MONTH";
        }

        handleTemplateChange();  // 🔥 apply disable
    }

    if (report.export_type) {
        document.getElementById("export_type").value = report.export_type;
    }
    if (report.date_field) {
        document.getElementById("date_field").value = report.date_field;
}
}

function handleTemplateChange() {
    const template = document.getElementById("date_template").value;

    const start = document.getElementById("start_date");
    const end = document.getElementById("end_date");
    const range = document.getElementById("range_days");

    if (template) {
        start.disabled = true;
        end.disabled = true;
        range.disabled = true;

        // optional clear
        start.value = "";
        end.value = "";
        range.value = "";
    } else {
        start.disabled = false;
        end.disabled = false;
        range.disabled = false;
    }
}

// EVENTS
document.getElementById("source").addEventListener("change", async () => {
    await loadProjects();
    await loadIssueTypes();
    await loadStatuses();
    await loadFields();
});

document.getElementById("date_template")
    .addEventListener("change", handleTemplateChange);

document.addEventListener("DOMContentLoaded", async () => {

    initDropdowns();

    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode");
    const id = params.get("id");

    if (mode && id) {
        // ✅ EDIT MODE
        await loadReportData(id);

    } else {
        // ✅ CREATE MODE
        await loadProjects();
        await loadIssueTypes();
        await loadStatuses();
        await loadFields();
    }
});

</script>
{% endraw %}
{% endblock %}
